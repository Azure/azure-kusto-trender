name: Release
permissions:
  checks: write
  pull-requests: write
  packages: write
  deployments: write
  contents: write
  id-token: write

on:
  push:
    tags:
      - 'v\d.*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: [18.x]
        registry-url: https://registry.npmjs.org/
        cache: 'npm'
        cache-dependency-path: |
          package-lock.json

    - name: Install dependencies
      run: npm ci --legacy-peer-deps

    - name: Build
      run: npm run build

    - name: Package
      run: npm pack

    - name: Publish to npm
      run: npm publish
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
